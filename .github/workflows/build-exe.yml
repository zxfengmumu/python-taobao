name: Build taobao_auto.exe

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
          cache: 'pip'  # 启用 pip 缓存
          cache-dependency-path: |
            requirements.txt
            **/pyproject.toml

      # 缓存 PyInstaller 的工作目录，避免重复分析依赖
      - name: Cache PyInstaller
        uses: actions/cache@v3
        id: cache-pyinstaller
        with:
          path: |
            ~/AppData/Local/pip/Cache
            build/
            dist/
            *.spec
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('requirements.txt', '**.py') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { 
            pip install -r requirements.txt
          } else {
            # 如果没有 requirements.txt，安装常用依赖
            pip install requests selenium pillow opencv-python pandas
          }
          
      - name: Build with PyInstaller
        run: |
          Write-Host "开始打包 taobao_auto..." -ForegroundColor Green
          
          # 检查是否有旧的构建文件
          if (Test-Path "taobao_auto.spec") {
            Write-Host "使用缓存的 spec 文件..." -ForegroundColor Yellow
            pyinstaller taobao_auto.spec
          } else {
            pyinstaller --noconfirm `
              --onefile `
              --windowed `
              --name taobao_auto `
              --icon taobao.ico `
              --add-data "campaign_template.json;." `
              --hidden-import core --hidden-import core.config `
              --hidden-import core.http_client --hidden-import core.db `
              --hidden-import core.notify `
              --hidden-import browser --hidden-import browser.driver `
              --hidden-import browser.login --hidden-import browser.slider `
              --hidden-import sync --hidden-import sync.base `
              --hidden-import sync.campaigns --hidden-import sync.products `
              --hidden-import sync.orders --hidden-import sync.risk_products `
              --hidden-import sync.tasks `
              panel.py
          }
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "打包成功！" -ForegroundColor Green
            
            # 复制配置文件
            if (Test-Path config.json) {
              Copy-Item config.json dist\ -Force
              Write-Host "配置文件已复制到 dist 目录" -ForegroundColor Green
            }
            
            # 显示文件大小
            $file = Get-Item "dist\taobao_auto.exe"
            $size = [math]::Round($file.Length / 1MB, 2)
            Write-Host "生成文件大小: $size MB" -ForegroundColor Cyan
          } else {
            Write-Host "打包失败！" -ForegroundColor Red
            exit 1
          }
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taobao_auto-windows
          path: dist/
          compression-level: 9
          retention-days: 30
